<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f0f">
    <title>STREAMER - Premium OTT</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC203H8isoltOx66YZ_wddqpWB4nBIMQZU",
            authDomain: "streamer-a5ea9.firebaseapp.com",
            projectId: "streamer-a5ea9",
            storageBucket: "streamer-a5ea9.firebasestorage.app",
            messagingSenderId: "821781298641",
            appId: "1:821781298641:web:1fcec50709460dcdd8f4f0",
            measurementId: "G-21LF69JH1Q"
        };
        
        try {
            window.firebaseApp = initializeApp(firebaseConfig);
            window.db = getFirestore(window.firebaseApp);
            window.auth = getAuth(window.firebaseApp);
            console.log('Firebase OK');
        } catch (e) {
            console.error('Firebase Error:', e);
        }
    </script>
</head>
<body>

    <!-- Background Particles -->
    <div id="particles-bg"></div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ========== WELCOME SCREEN ========== -->
    <div id="welcome-screen" class="screen active">
        <div class="welcome-wrapper">
            <div class="welcome-bg-effects">
                <div class="bg-orb orb-1"></div>
                <div class="bg-orb orb-2"></div>
                <div class="bg-orb orb-3"></div>
            </div>
            
            <div class="welcome-content">
                <div class="logo-box animate-glow">
                    <i class="fas fa-play"></i>
                </div>
                
                <h1 class="app-title gradient-text animate-shimmer">STREAMER</h1>
                <p class="app-subtitle">Premium OTT Experience</p>
                
                <div class="welcome-buttons">
                    <button id="btn-start" class="btn-primary ripple-btn">
                        <i class="fas fa-play-circle"></i>
                        <span>Start Watching</span>
                    </button>
                    
                    <button id="btn-admin-login" class="btn-secondary">
                        <i class="fas fa-lock"></i>
                        <span>Admin Access</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== MAIN SCREEN ========== -->
    <div id="main-screen" class="screen">
        
        <!-- Header -->
        <header class="main-header">
            <div class="header-inner">
                <h1 class="header-logo gradient-text">STREAMER</h1>
                <div class="header-actions">
                    <button id="btn-search" class="icon-btn">
                        <i class="fas fa-search"></i>
                    </button>
                    <button id="btn-profile" class="icon-btn avatar-btn">
                        <i class="fas fa-user"></i>
                    </button>
                </div>
            </div>
            
            <!-- Admin Panel -->
            <div id="admin-panel" class="admin-panel hidden">
                <div class="admin-badge">Admin Mode</div>
                
                <div class="panel-header">
                    <h3><i class="fas fa-cog"></i> Content Manager</h3>
                    <button id="btn-close-admin" class="icon-btn-sm">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <!-- Upload -->
                <div class="form-group">
                    <label class="form-label">Poster Image</label>
                    <div class="upload-zone" id="upload-zone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Click to upload image</p>
                        <small>JPG, PNG, WebP</small>
                    </div>
                    <input type="file" id="file-upload" accept="image/*" hidden>
                    <img id="preview-img" class="preview-img hidden" alt="Preview">
                    <input type="url" id="input-poster-url" class="form-input mt-2" placeholder="Or paste image URL">
                </div>
                
                <!-- Title & Category -->
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Title *</label>
                        <input type="text" id="input-title" class="form-input" placeholder="Enter title">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <select id="select-category" class="form-input">
                            <option value="Anime">Anime</option>
                            <option value="Donghua">Donghua (Chinese)</option>
                            <option value="K-Drama">K-Drama</option>
                            <option value="Movies">Movies</option>
                            <option value="Web Series">Web Series</option>
                            <option value="Sports">Sports</option>
                        </select>
                    </div>
                </div>
                
                <!-- Meta -->
                <div class="form-row three-col">
                    <div class="form-group">
                        <label class="form-label">Year</label>
                        <input type="number" id="input-year" class="form-input" value="2024">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Duration</label>
                        <input type="text" id="input-duration" class="form-input" placeholder="24 min">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Rating</label>
                        <input type="number" id="input-rating" class="form-input" min="0" max="10" step="0.1" placeholder="8.5">
                    </div>
                </div>
                
                <!-- Description -->
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea id="input-description" class="form-input" rows="3" placeholder="Story synopsis..."></textarea>
                </div>
                
                <!-- Video -->
                <div class="form-group">
                    <label class="form-label">Video URL *</label>
                    <input type="url" id="input-video" class="form-input" placeholder="Dailymotion or MP4 URL">
                    <div class="video-type-btns">
                        <button id="type-dm" class="type-btn active">Dailymotion</button>
                        <button id="type-mp4" class="type-btn">MP4/CDN</button>
                    </div>
                </div>
                
                <!-- Subtitle -->
                <div class="form-group">
                    <label class="form-label">Subtitle URL (.vtt) - Optional</label>
                    <input type="url" id="input-subtitle" class="form-input" placeholder="https://example.com/subtitles.vtt">
                </div>
                
                <!-- Actions -->
                <div class="panel-actions">
                    <button id="btn-save" class="btn-primary flex-1">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button id="btn-demo" class="btn-success">
                        <i class="fas fa-magic"></i>
                    </button>
                </div>
            </div>
            
            <!-- Categories -->
            <div class="category-bar" id="category-bar">
                <button class="cat-pill active" data-cat="All">All</button>
                <button class="cat-pill" data-cat="Anime">Anime</button>
                <button class="cat-pill" data-cat="Donghua">Donghua</button>
                <button class="cat-pill" data-cat="K-Drama">K-Drama</button>
                <button class="cat-pill" data-cat="Movies">Movies</button>
                <button class="cat-pill" data-cat="Web Series">Web Series</button>
                <button class="cat-pill" data-cat="Sports">Sports</button>
            </div>
        </header>

        <!-- Hero Slider -->
        <section class="hero-section">
            <div class="hero-slider" id="hero-slider">
                <div class="hero-slides" id="hero-slides">
                    <!-- JS injected -->
                </div>
                <div class="hero-dots" id="hero-dots"></div>
                <button class="slider-arrow slider-prev" id="slider-prev">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="slider-arrow slider-next" id="slider-next">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <div class="hero-gradient"></div>
            </div>
        </section>

        <!-- Content Sections -->
        <main class="content-area">
            
            <!-- Continue Watching -->
            <section id="section-continue" class="content-section hidden">
                <div class="section-header">
                    <h3><i class="fas fa-play-circle text-blue-500"></i> Continue Watching</h3>
                    <button id="clear-continue" class="text-btn">Clear All</button>
                </div>
                <div class="horizontal-scroll" id="continue-scroll"></div>
            </section>

            <!-- Trending -->
            <section class="content-section">
                <div class="section-header">
                    <h3><i class="fas fa-fire text-orange-500"></i> Trending Now</h3>
                </div>
                <div class="horizontal-scroll" id="trending-scroll"></div>
            </section>

            <!-- For You -->
            <section class="content-section">
                <div class="section-header">
                    <h3><i class="fas fa-sparkles text-purple-500"></i> For You</h3>
                </div>
                <div class="horizontal-scroll" id="foryou-scroll"></div>
            </section>

            <!-- New Releases -->
            <section class="content-section">
                <div class="section-header">
                    <h3><i class="fas fa-clock text-green-500"></i> New Releases</h3>
                </div>
                <div class="horizontal-scroll" id="new-scroll"></div>
            </section>
        </main>
    </div>

    <!-- ========== SEARCH SCREEN ========== -->
    <div id="search-screen" class="screen">
        <header class="page-header">
            <button id="search-back" class="icon-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>Search</h2>
        </header>
        
        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Search anime, movies, dramas..." autocomplete="off">
        </div>
        
        <div class="search-results" id="search-results">
            <div class="empty-search">
                <i class="fas fa-search"></i>
                <p>Type to search content...</p>
            </div>
        </div>
    </div>

    <!-- ========== PROFILE SCREEN ========== -->
    <div id="profile-screen" class="screen">
        <header class="page-header">
            <button id="profile-back" class="icon-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>Profile</h2>
        </header>
        
        <div class="profile-content">
            <div class="profile-avatar animate-glow-pulse">
                <i class="fas fa-user"></i>
            </div>
            <h3 class="profile-name">Guest User</h3>
            <p class="profile-plan">Free Plan</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-num" id="stat-continue">0</span>
                    <span class="stat-label">Continue</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num" id="stat-total">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num" id="stat-watch">0h</span>
                    <span class="stat-label">Watched</span>
                </div>
            </div>
            
            <div class="profile-actions">
                <button id="btn-admin-profile" class="btn-outline">
                    <i class="fas fa-crown text-yellow-500"></i>
                    <span>Admin Panel</span>
                </button>
                <button id="btn-clear-data" class="btn-danger">
                    <i class="fas fa-trash"></i>
                    <span>Clear History</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ========== PLAYER SCREEN ========== -->
    <div id="player-screen" class="screen">
        <div class="player-wrapper" id="player-wrapper">
            
            <!-- Video Containers -->
            <div id="dm-player" class="video-layer hidden"></div>
            <video id="native-player" class="video-layer hidden" playsinline></video>
            
            <!-- Loading -->
            <div class="player-loader" id="player-loader">
                <div class="loader-ring"></div>
            </div>
            
            <!-- Center Play -->
            <button class="center-play" id="center-play">
                <i class="fas fa-play"></i>
            </button>
            
            <!-- Subtitles -->
            <div class="subtitle-layer" id="subtitle-layer"></div>
            
            <!-- AI Button -->
            <button class="ai-btn" id="ai-btn" title="AI Subtitles">
                <i class="fas fa-robot"></i>
            </button>
            
            <!-- Top Bar -->
            <div class="player-topbar">
                <button id="player-back" class="icon-btn">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="player-info">
                    <h4 id="player-title">Loading...</h4>
                    <p id="player-meta"></p>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="player-controls">
                <div class="progress-track" id="progress-track">
                    <div class="progress-bar" id="progress-bar"></div>
                    <div class="progress-thumb"></div>
                </div>
                
                <div class="controls-row">
                    <div class="controls-left">
                        <button id="ctrl-play" class="ctrl-btn">
                            <i class="fas fa-pause"></i>
                        </button>
                        <button id="ctrl-back" class="ctrl-btn">
                            <i class="fas fa-undo-alt"></i>
                            <span class="skip-badge">10</span>
                        </button>
                        <button id="ctrl-fwd" class="ctrl-btn">
                            <i class="fas fa-redo-alt"></i>
                            <span class="skip-badge">10</span>
                        </button>
                        <span class="time-display" id="time-display">0:00 / 0:00</span>
                    </div>
                    
                    <div class="controls-right">
                        <button id="ctrl-sub" class="ctrl-btn">
                            <i class="fas fa-closed-captioning"></i>
                        </button>
                        <button id="ctrl-fullscreen" class="ctrl-btn">
                            <i class="fas fa-expand"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== BOTTOM NAV ========== -->
    <nav id="bottom-nav" class="bottom-nav hidden">
        <button class="nav-item active" data-screen="main-screen">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </button>
        <button class="nav-item" data-screen="search-screen">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </button>
        <button class="nav-item" data-screen="profile-screen">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </button>
    </nav>

    <!-- Scripts -->
    <script src="https://api.dmcdn.net/all.js"></script>
    <script type="module" src="app.js"></script>
    <script src="player.js"></script>

</body>
    </html>
