<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Stream - Premium Video Player</title>
    <link rel="stylesheet" href="css/player.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- Main Container -->
    <div class="app-container">
        
        <!-- Header -->
        <header class="main-header">
            <div class="logo">
                <i class="fas fa-play-circle"></i>
                <span>AnimeStream</span>
            </div>
            <nav class="main-nav">
                <a href="#" class="active">Home</a>
                <a href="#">Trending</a>
                <a href="#">Movies</a>
                <a href="#">Series</a>
            </nav>
            <div class="header-actions">
                <button class="search-btn"><i class="fas fa-search"></i></button>
                <button class="cast-btn" onclick="toggleCast()"><i class="fas fa-cast"></i></button>
                <button class="admin-toggle" onclick="showAdminLogin()"><i class="fas fa-cog"></i></button>
            </div>
        </header>

        <!-- Video Player Section -->
        <div class="video-section">
            <div class="video-container" id="videoContainer">
                <video id="mainVideo" preload="metadata"></video>
                
                <!-- Loading Spinner -->
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner"></div>
                    <p>Loading stream...</p>
                </div>

                <!-- Big Play Button (initial state) -->
                <div class="big-play-btn" id="bigPlayBtn" onclick="togglePlay()">
                    <i class="fas fa-play"></i>
                </div>

                <!-- Top Controls -->
                <div class="player-top-controls">
                    <button class="back-btn" onclick="goBack()"><i class="fas fa-chevron-down"></i></button>
                    <div class="video-info">
                        <h3 id="videoTitle">Trump and Zelenskyy play cards in the Oval Office</h3>
                        <p id="videoChannel">@22Minutes</p>
                    </div>
                    <div class="top-right-controls">
                        <button class="control-btn" onclick="togglePause()" id="topPauseBtn"><i class="fas fa-pause"></i></button>
                        <button class="control-btn" onclick="toggleCast()"><i class="fas fa-cast"></i></button>
                        <button class="control-btn" onclick="toggleSubtitles()" id="ccBtn"><i class="fas fa-closed-captioning"></i></button>
                        <button class="control-btn" onclick="toggleSettings()" id="settingsBtn"><i class="fas fa-cog"></i></button>
                        <button class="control-btn" onclick="closePlayer()"><i class="fas fa-times"></i></button>
                    </div>
                </div>

                <!-- Center Controls -->
                <div class="player-center-controls">
                    <button class="center-btn skip-back" onclick="skipBackward()">
                        <i class="fas fa-undo"></i>
                        <span>10</span>
                    </button>
                    <button class="center-btn play-pause" onclick="togglePlay()" id="centerPlayBtn">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="center-btn skip-forward" onclick="skipForward()">
                        <i class="fas fa-redo"></i>
                        <span>10</span>
                    </button>
                    <button class="center-btn next-btn" onclick="nextVideo()">
                        <i class="fas fa-step-forward"></i>
                    </button>
                </div>

                <!-- Subtitle Display -->
                <div class="subtitle-display" id="subtitleDisplay"></div>

                <!-- Bottom Controls -->
                <div class="player-bottom-controls">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar">
                            <div class="progress-filled" id="progressFilled"></div>
                            <div class="progress-handle" id="progressHandle"></div>
                        </div>
                        <div class="time-tooltip" id="timeTooltip">00:00</div>
                    </div>
                    
                    <div class="controls-row">
                        <div class="left-controls">
                            <button class="control-btn" onclick="togglePlay()" id="bottomPlayBtn"><i class="fas fa-play"></i></button>
                            <button class="control-btn" onclick="skipBackward()"><i class="fas fa-undo"></i></button>
                            <button class="control-btn" onclick="skipForward()"><i class="fas fa-redo"></i></button>
                            
                            <div class="volume-container">
                                <button class="control-btn" onclick="toggleMute()" id="muteBtn"><i class="fas fa-volume-up"></i></button>
                                <div class="volume-slider">
                                    <input type="range" min="0" max="100" value="100" id="volumeSlider" oninput="setVolume(this.value)">
                                </div>
                            </div>
                            
                            <div class="time-display">
                                <span id="currentTime">0:01</span>
                                <span>/</span>
                                <span id="duration">2:31</span>
                            </div>
                        </div>
                        
                        <div class="right-controls">
                            <button class="control-btn" onclick="toggleSubtitles()"><i class="fas fa-closed-captioning"></i></button>
                            <button class="control-btn" onclick="toggleSettings()" id="bottomSettingsBtn"><i class="fas fa-cog"></i></button>
                            <button class="control-btn" onclick="toggleFullscreen()" id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Settings Menu -->
                <div class="settings-menu" id="settingsMenu">
                    <div class="settings-item" onclick="showQualityMenu()">
                        <span>Quality</span>
                        <span id="currentQuality">Auto <i class="fas fa-chevron-right"></i></span>
                    </div>
                    <div class="settings-item" onclick="showSpeedMenu()">
                        <span>Playback Speed</span>
                        <span id="currentSpeed">1x <i class="fas fa-chevron-right"></i></span>
                    </div>
                    <div class="settings-item" onclick="toggleSubtitles()">
                        <span>Subtitles</span>
                        <span id="subtitlesStatus">Off</span>
                    </div>
                </div>

                <!-- Quality Menu -->
                <div class="quality-menu" id="qualityMenu">
                    <div class="menu-header" onclick="backToSettings()">
                        <i class="fas fa-arrow-left"></i> Quality
                    </div>
                    <div class="quality-options" id="qualityOptions">
                        <div class="quality-option active" onclick="setQuality('auto')">Auto</div>
                    </div>
                </div>

                <!-- Speed Menu -->
                <div class="speed-menu" id="speedMenu">
                    <div class="menu-header" onclick="backToSettings()">
                        <i class="fas fa-arrow-left"></i> Playback Speed
                    </div>
                    <div class="speed-options">
                        <div class="speed-option" onclick="setSpeed(0.25)">0.25x</div>
                        <div class="speed-option" onclick="setSpeed(0.5)">0.5x</div>
                        <div class="speed-option" onclick="setSpeed(0.75)">0.75x</div>
                        <div class="speed-option active" onclick="setSpeed(1)">1x (Normal)</div>
                        <div class="speed-option" onclick="setSpeed(1.25)">1.25x</div>
                        <div class="speed-option" onclick="setSpeed(1.5)">1.5x</div>
                        <div class="speed-option" onclick="setSpeed(1.75)">1.75x</div>
                        <div class="speed-option" onclick="setSpeed(2)">2x</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="action-btn" onclick="likeVideo()"><i class="fas fa-thumbs-up"></i></button>
            <button class="action-btn" onclick="dislikeVideo()"><i class="fas fa-thumbs-down"></i></button>
            <button class="action-btn" onclick="showComments()"><i class="fas fa-comment"></i></button>
            <button class="action-btn" onclick="saveVideo()"><i class="fas fa-bookmark"></i></button>
            <button class="action-btn" onclick="shareVideo()"><i class="fas fa-share"></i></button>
            <button class="action-btn" onclick="showMore()"><i class="fas fa-ellipsis-h"></i></button>
        </div>

        <!-- Share Modal -->
        <div class="share-modal" id="shareModal">
            <div class="share-content">
                <h3>Share</h3>
                <div class="share-options">
                    <button onclick="shareTo('whatsapp')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    <button onclick="shareTo('facebook')"><i class="fab fa-facebook"></i> Facebook</button>
                    <button onclick="shareTo('twitter')"><i class="fab fa-twitter"></i> Twitter</button>
                    <button onclick="shareTo('copy')"><i class="fas fa-link"></i> Copy Link</button>
                </div>
                <button class="close-modal" onclick="closeShare()">Close</button>
            </div>
        </div>

        <!-- Video Grid -->
        <div class="video-grid" id="videoGrid">
            <!-- Dynamically loaded from data.js -->
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div class="admin-login-modal" id="adminLoginModal">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="password" id="adminPassword" placeholder="Enter admin password">
            <button onclick="verifyAdmin()">Login</button>
            <button class="cancel-btn" onclick="closeAdminLogin()">Cancel</button>
            <p class="error-msg" id="loginError"></p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/player.js"></script>
</body>
</html>
