<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAMER PRO MAX</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body { background:#000; color:white; font-family:Arial; margin:0; }
.screen { display:none; }
.screen.active { display:block; }
</style>
</head>

<body>

<!-- ================= WELCOME ================= -->
<div id="welcome-screen" class="screen active">
<h1>STREAMER</h1>
<button onclick="showScreen('login-screen')">Login</button>
<button onclick="showScreen('signup-screen')">Signup</button>
<button onclick="guestLogin()">Guest</button>
</div>

<!-- ================= LOGIN ================= -->
<div id="login-screen" class="screen">
<h2>Login</h2>
<input id="login-email" placeholder="Email">
<input id="login-password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- ================= SIGNUP ================= -->
<div id="signup-screen" class="screen">
<h2>Signup</h2>
<input id="signup-name" placeholder="Name">
<input id="signup-email" placeholder="Email">
<input id="signup-password" placeholder="Password">
<button onclick="signUp()">Signup</button>
</div>

<!-- ================= HOME ================= -->
<div id="home-screen" class="screen">
<h2>Home</h2>
<div id="movies"></div>
</div>

<!-- ================= PLAYER ================= -->
<div id="player-overlay" style="display:none; position:fixed; inset:0; background:black;">
<button onclick="closePlayer()">Close</button>
<iframe id="video-iframe" style="width:100%; height:80%;"></iframe>
</div>

<!-- ================= JS ================= -->
<script>
let currentUser=null;
let movies=[
{ id:"1", title:"Demo Movie", videoUrl:"https://www.dailymotion.com/embed/video/x8xyz" }
];

// SCREEN SWITCH
function showScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// AUTH (BASIC MOCK)
function login(){
currentUser=true;
showScreen('home-screen');
renderMovies();
}

function signUp(){
currentUser=true;
showScreen('home-screen');
renderMovies();
}

function guestLogin(){
currentUser=true;
showScreen('home-screen');
renderMovies();
}

// MOVIES
function renderMovies(){
let container=document.getElementById('movies');
container.innerHTML=movies.map(m=>
`<div>
<h3>${m.title}</h3>
<button onclick="playMovie('${m.videoUrl}')">Play</button>
</div>`).join('');
}

// PLAYER
function playMovie(url){
document.getElementById('player-overlay').style.display='block';
document.getElementById('video-iframe').src=url+"?autoplay=1";
}

function closePlayer(){
document.getElementById('player-overlay').style.display='none';
document.getElementById('video-iframe').src='';
}
</script>

</body>
</html>
